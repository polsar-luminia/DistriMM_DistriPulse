# DistriMM — Security Headers para Nginx (producción)
# Incluir en el bloque server{} de la configuración de Nginx:
#   include /ruta/a/nginx-security-headers.conf;

# Prevenir MIME sniffing
add_header X-Content-Type-Options "nosniff" always;

# Prevenir clickjacking (no se debe embeber en iframes)
add_header X-Frame-Options "DENY" always;

# Controlar referrer
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# HSTS — forzar HTTPS por 2 años
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# CSP — ajustar dominios según entorno
# Reemplazar *.supabase.co con tu proyecto específico si lo prefieres
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.sentry.io; font-src 'self'; frame-ancestors 'none';" always;
